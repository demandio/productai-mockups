<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product.ai - Consumer Surfaces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e11;
  --bg-card: #17171b;
  --bg-card-hover: #1c1c21;
  --bg-preview: #0a0a0d;
  --bg-bar: rgba(14,14,17,0.96);
  --text-1: #f4f4f5;
  --text-2: #a1a1aa;
  --text-3: #71717a;
  --text-4: #52525b;
  --text-5: #3f3f46;
  --text-6: #27272a;
  --border: rgba(255,255,255,0.06);
  --border-card: rgba(255,255,255,0.08);
  --border-hover: rgba(139,92,246,0.3);
  --v300: #c4b5fd;
  --v400: #a78bfa;
  --v500: #8b5cf6;
  --green: #34d399;
  --amber: #fbbf24;
  --sans: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', monospace;
  --max-w: 1240px;
  --px: 48px;
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--sans); font-feature-settings: "ss02" 1, "liga" 0, "clig" 0;
  background: var(--bg); color: var(--text-1); line-height: 1.6; min-height: 100vh;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
a { color: inherit; text-decoration: none; }

/* ── Header ── */
.site-header {
  padding: 56px var(--px) 28px;
  max-width: var(--max-w); margin: 0 auto;
}
.logo { display: flex; align-items: baseline; margin-bottom: 10px; }
.logo-p { font-size: 24px; font-weight: 600; color: var(--text-1); letter-spacing: -0.02em; }
.logo-a { font-family: var(--mono); font-size: 24px; color: var(--v500); }
.site-header h1 {
  font-size: 36px; font-weight: 500; color: var(--text-1);
  letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 6px;
}
.site-header > p { font-size: 15px; color: var(--text-3); max-width: 580px; }
.site-header .meta {
  display: flex; gap: 20px; margin-top: 14px;
  font-size: 11px; font-family: var(--mono); color: var(--text-5); letter-spacing: 0.04em;
}

/* ── Sticky Nav ── */
.sticky-nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-bar);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

/* ── Tabs ── */
.tab-bar {
  display: flex; gap: 2px; max-width: var(--max-w);
  margin: 0 auto; padding: 0 var(--px); overflow-x: auto;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 14px 20px 12px; font-size: 13px; font-weight: 500;
  font-family: var(--sans); color: var(--text-4); cursor: pointer;
  border: none; background: none; white-space: nowrap;
  position: relative; transition: color 150ms;
}
.tab-btn:hover { color: var(--text-2); }
.tab-btn.active { color: var(--v400); }
.tab-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 16px; right: 16px;
  height: 2px; background: var(--v500); border-radius: 1px;
}

/* ── Section Nav ── */
.section-nav {
  display: flex; gap: 2px; max-width: var(--max-w);
  margin: 0 auto; padding: 8px var(--px); overflow-x: auto;
  border-top: 1px solid var(--border);
}
.section-nav::-webkit-scrollbar { display: none; }
.snav-btn {
  padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 500;
  color: var(--text-4); white-space: nowrap; cursor: pointer;
  transition: all 150ms; border: none; background: none; font-family: var(--sans);
}
.snav-btn:hover { color: var(--text-2); background: rgba(255,255,255,0.04); }

/* ── Sections ── */
.section { max-width: var(--max-w); margin: 0 auto; padding: 56px var(--px) 0; }
.section:first-child { padding-top: 36px; }
.section-header { margin-bottom: 24px; }
.section-label {
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--v400);
  margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
}
.section-label::before { content: ''; width: 20px; height: 1px; background: var(--v500); opacity: 0.5; }
.section-header h2 {
  font-size: 22px; font-weight: 600; color: var(--text-1);
  letter-spacing: -0.02em; margin-bottom: 4px;
}
.section-header p { font-size: 14px; color: var(--text-3); line-height: 1.5; max-width: 640px; }

/* ── Card Grid ── */
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px;
}

/* ── Cards ── */
.card {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: 14px; overflow: hidden; cursor: pointer;
  transition: border-color 200ms, transform 200ms, box-shadow 200ms;
}
.card:hover {
  border-color: var(--border-hover); transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}
.card.full { grid-column: 1 / -1; }
.card.no-click { cursor: default; }
.card.no-click:hover { border-color: var(--border-card); transform: none; box-shadow: none; }

.card-preview {
  height: 220px; background: var(--bg-preview);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card.full .card-preview { height: 280px; }

.card-preview iframe {
  width: 390px; height: 844px; border: none;
  transform: scale(0.24); transform-origin: center center;
  pointer-events: none; border-radius: 48px;
}
.card-preview iframe, .detail-mockup iframe {
  scrollbar-width: none;
}
.card-preview iframe::-webkit-scrollbar,
.detail-mockup iframe::-webkit-scrollbar { display: none; }

.card-preview.wide iframe {
  width: 1280px; height: 820px; transform: scale(0.26); border-radius: 10px;
}
.card-preview.tall iframe {
  width: 1200px; height: 2400px; transform: scale(0.18);
  transform-origin: top center; border-radius: 10px;
}
.card-preview.tall { align-items: flex-start; }
.card.full .card-preview.tall { height: 320px; }

.card-info { padding: 16px 18px; }
.card-info h3 { font-size: 14px; font-weight: 600; color: var(--text-1); margin-bottom: 3px; }
.card-info p { font-size: 13px; color: var(--text-4); line-height: 1.4; }
.tags { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }

/* ── Tags ── */
.tag {
  padding: 3px 8px; border-radius: 100px;
  font-size: 10px; font-weight: 600; font-family: var(--mono); letter-spacing: 0.04em;
}
.tag-mobile { background: rgba(139,92,246,0.1); color: var(--v400); }
.tag-ext { background: rgba(52,211,153,0.1); color: var(--green); }
.tag-key { background: rgba(255,255,255,0.05); color: var(--text-3); }
.tag-revenue { background: rgba(251,191,36,0.1); color: var(--amber); }
.tag-process { background: rgba(255,255,255,0.03); color: var(--text-4); }

/* ── Detail View ── */
.detail-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-bar);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); padding: 0 var(--px);
}
.detail-bar-inner {
  max-width: var(--max-w); margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px; gap: 16px;
}
.detail-back {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 500; color: var(--text-3);
  cursor: pointer; border: none; background: none; font-family: var(--sans);
  padding: 6px 0; transition: color 150ms;
}
.detail-back:hover { color: var(--text-1); }
.detail-back svg { width: 16px; height: 16px; flex-shrink: 0; }

.detail-actions { display: flex; align-items: center; gap: 6px; }
.detail-nav-btn {
  display: flex; align-items: center; gap: 4px; padding: 6px 12px;
  border-radius: 8px; font-size: 12px; font-weight: 500; font-family: var(--sans);
  color: var(--text-3); border: 1px solid var(--border-card);
  background: none; cursor: pointer; transition: all 150ms;
}
.detail-nav-btn:hover { color: var(--text-1); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
.detail-nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }
.detail-nav-btn svg { width: 14px; height: 14px; }

.detail-open {
  display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px;
  border-radius: 8px; font-size: 12px; font-weight: 500; font-family: var(--sans);
  color: var(--v400); border: 1px solid rgba(139,92,246,0.2);
  background: rgba(139,92,246,0.06); cursor: pointer; transition: all 150ms;
}
.detail-open:hover { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.3); }
.detail-open svg { width: 14px; height: 14px; }

.detail-content { max-width: var(--max-w); margin: 0 auto; padding: 32px var(--px) 64px; }

.detail-meta { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
.detail-meta-left { flex: 1; min-width: 0; }
.detail-meta h1 { font-size: 28px; font-weight: 600; color: var(--text-1); letter-spacing: -0.02em; margin-bottom: 6px; }
.detail-meta p { font-size: 15px; color: var(--text-3); line-height: 1.5; max-width: 700px; }
.detail-meta .tags { margin-top: 12px; }

.detail-mockup {
  background: var(--bg-preview); border: 1px solid var(--border-card);
  border-radius: 16px; overflow: hidden; margin-bottom: 32px;
}
.detail-mockup.mobile-frame {
  display: flex; justify-content: center; padding: 48px 24px;
}
.detail-mockup.mobile-frame iframe {
  width: 390px; height: 844px; border: none; border-radius: 48px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 16px 48px rgba(0,0,0,0.4);
}
.detail-mockup.wide-frame iframe {
  width: 100%; border: none; min-height: 800px;
}

.detail-context { border-top: 1px solid var(--border); padding-top: 24px; }
.detail-context h3 {
  font-size: 12px; font-weight: 600; font-family: var(--mono);
  letter-spacing: 0.06em; color: var(--text-4); margin-bottom: 10px; text-transform: uppercase;
}
.detail-context p { font-size: 14px; color: var(--text-3); line-height: 1.7; max-width: 720px; }

/* ── Strategy ── */
.strategy-embed { max-width: var(--max-w); margin: 0 auto; padding: 24px var(--px) 64px; }
.strategy-embed iframe { width: 100%; border: none; height: 8000px; border-radius: 12px; }

/* ── Badge display ── */
.badge-display {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: 14px; padding: 32px; margin-bottom: 16px;
}
.badge-row { display: flex; gap: 40px; align-items: center; justify-content: center; flex-wrap: wrap; }
.badge-item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.badge-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; position: relative;
}
.badge-icon.inactive { background: rgba(139,92,246,0.15); }
.badge-icon.active { background: var(--v500); }
.badge-dot {
  position: absolute; top: -2px; right: -2px; width: 10px; height: 10px;
  border-radius: 50%; border: 2px solid var(--bg-card);
}
.badge-label { font-family: var(--mono); font-size: 10px; }

.toolbar-context {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: 14px; padding: 24px; text-align: center;
}
.toolbar-strip {
  display: inline-flex; align-items: center; gap: 4px;
  background: #252525; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px;
}
.toolbar-icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.toolbar-context p { font-size: 11px; color: var(--text-4); max-width: 280px; margin: 0 auto; line-height: 1.5; }

/* ── Footer ── */
.site-footer {
  max-width: var(--max-w); margin: 0 auto; padding: 32px var(--px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.site-footer .f-lp { font-size: 15px; font-weight: 600; color: var(--text-4); }
.site-footer .f-la { font-family: var(--mono); font-size: 15px; color: var(--text-5); }
.site-footer .f-meta { font-size: 11px; font-family: var(--mono); color: var(--text-5); }

/* ── Keyboard hint ── */
.kbd-hint {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 16px; font-size: 10px; font-family: var(--mono); color: var(--text-5);
  pointer-events: none; opacity: 0.5;
}
.kbd-hint kbd {
  padding: 2px 6px; border-radius: 4px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border-card);
  font-family: var(--mono); font-size: 10px; color: var(--text-4);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  :root { --px: 20px; }
  .site-header h1 { font-size: 28px; }
  .card-grid { grid-template-columns: 1fr; }
  .detail-meta h1 { font-size: 24px; }
  .detail-mockup.mobile-frame { padding: 24px 12px; }
  .detail-mockup.mobile-frame iframe { width: 100%; max-width: 390px; height: auto; aspect-ratio: 390/844; }
  .badge-row { gap: 24px; }
  .detail-bar-inner { flex-wrap: wrap; height: auto; padding: 8px 0; gap: 8px; }
}
</style>
</head>

        items: [
          { slug: 'home-screen', src: 'home-screen-v2-mockup.html', title: 'Home Screen', type: 'mobile',
            desc: 'Personalized greeting, scan button, unified For You feed, recent conversations. Chat input at bottom.',
            caption: `The home screen opens with a functional greeting that tells you something useful - how many alerts you have - not just 'good afternoon.' The scan button is prominent because in-store scanning is a primary use case. Below it, a single unified 'For You' feed merges all proactive signals (price drops, restocks, new releases, reorder reminders) instead of splitting them into separate sections. Recent conversation threads are compressed at the bottom. Chat input at the bottom follows the AI chat app convention (ChatGPT/Claude). No bottom tab bar - navigation lives in the hamburger drawer.`,

            caption: `Three nav items only: Home, My Products (with Own and Want tabs), and My Radar. We merged 'Saved' and 'Watching' into My Products because the distinction was confusing to users. Profile is accessed by tapping the avatar (top right on home screen), not from the nav. The profile row in the drawer is tappable and goes to the full profile/preference management page. Conversation history with verdict badges lives below the nav items. Footer has Settings and About Product.ai.`,

          { slug: 'chat-mattress', src: 'chat-mattress-mockup.html', title: 'Chat: Mattress (Kill Shot)', type: 'mobile',
            desc: 'Clarifying questions, Kill Shot verdict on Purple, ranked comparison card with alternatives.',
            caption: `Shows the Kill Shot - the trust primitive. The AI asks clarifying questions (sleep position, pain issues, partner, budget) before answering. Then delivers a red 'Don't Buy This' verdict on the Purple mattress with specific evidence: side sleepers show 2.3x higher hip pressure, Purple's own data shows 31% return rate for side sleepers. This is what no affiliate-funded site would ever say. Below the Kill Shot, a ranked comparison card recommends three alternatives personalized to the user's specific situation (side sleeper, back pain, partner sleeps hot, $1500 budget).`,

            caption: `A comprehensive showcase of every chat UI module. Gift shopping for a cooking-obsessed husband. Shows: multi-product grid (2x2 with tags like Top Pick, Budget Pick), positive green 'Highly Recommended' verdict with pros/cons grid, 90-day price history sparkline, link paste (user drops a Williams Sonoma URL), honest gap card ('Limited Data' on a product we can't fully verify), deal found alert mid-conversation (Amazon bundle), and the 'Got it' purchase confirmation that closes the feedback loop and feeds the Preference Graph.`,

      {
        id: 'notifications', label: 'Notifications', sublabel: 'Mobile App',

            caption: `Three notification contexts shown side by side. Left: lock screen stack with four notifications (price drop, restock, reorder reminder, new release) - each using the Product.ai icon and color-coded signal tags matching My Radar. The notifications carry real intelligence, not generic alerts: '$29 above your target', 'your SKINCARE15 code still works', 'your saved alternative is stronger.' Center: banner notification (in-app) showing a price target hit dropping over the current screen. Right: verdict update and seasonal deal notifications showing the system proactively correcting its own analysis and forecasting upcoming sales against your saved items. Every notification passes the Preference Graph filter - only signals relevant to YOUR products, YOUR targets, YOUR saved items.`,

            tags: [['Mobile','mobile'],['Preference Graph','key']] },

            caption: `Second round of partner badge explorations. Visual metaphors for the partner relationship.`,
            tags: [['Exploration','key'],['Revenue','revenue']] },
          { slug: 'rev-badge-v3', src: 'partner-badge-v3-heart-and-more.html', title: 'Partner Badge v3: Heart & More', type: 'wide',
            desc: 'Heart icon and additional visual treatments for partner disclosure.',
            caption: `Third round of partner badge explorations. Heart icon and additional visual treatments.`,
            tags: [['Exploration','key'],['Revenue','revenue']] }
        ]
      }
    ]
  },

  { id: 'strategy', label: 'Strategy', special: 'strategy' }
];

// ═══════════════════════════════════════════════════════════════
// SVG ICONS
// ═══════════════════════════════════════════════════════════════
const IC = {
  back: '<svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><polyline points="160 208 80 128 160 48"/></svg>',
  next: '<svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><polyline points="96 48 176 128 96 208"/></svg>',
  ext: '<svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M200 104V56h-48"/><line x1="200" y1="56" x2="128" y2="128"/><path d="M168 136v64a8 8 0 0 1-8 8H56a8 8 0 0 1-8-8V96a8 8 0 0 1 8-8h64"/></svg>',
  bars: '<svg width="18" height="18" viewBox="0 0 256 256" fill="currentColor"><path d="M176 232a8 8 0 0 1-8-8V72a8 8 0 0 1 16 0v152a8 8 0 0 1-8 8zm-48 0a8 8 0 0 1-8-8V104a8 8 0 0 1 16 0v120a8 8 0 0 1-8 8zm-48 0a8 8 0 0 1-8-8V136a8 8 0 0 1 16 0v88a8 8 0 0 1-8 8z"/></svg>',
};

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const app = document.getElementById('app');

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderTags(tags) {
  return tags.map(([l,t]) => `<span class="tag tag-${t}">${esc(l)}</span>`).join('');
}

function getAllItems(tabData) {
  const items = [];
  for (const s of tabData.sections || []) {
    for (const it of s.items || []) items.push({ ...it, sectionLabel: s.label });
  }
  return items;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: SHARED
// ═══════════════════════════════════════════════════════════════
function renderHeader() {
  return `<div class="site-header">
    <div class="logo"><span class="logo-p">Product</span><span class="logo-a">.ai</span></div>
    <h1>Consumer Surfaces</h1>
    <p>Product strategy and high-fidelity mockups for the Product.ai mobile app, desktop extension, and web surfaces.</p>
    <div class="meta"><span>March 2026</span><span>51 Screens</span></div>
  </div>`;
}

function renderTabBar(activeId) {
  return `<div class="tab-bar">${TABS.map(t =>
    `<button class="tab-btn${t.id === activeId ? ' active' : ''}" data-tab="${t.id}">${esc(t.label)}</button>`
  ).join('')}</div>`;
}

function renderSectionNav(tabData) {
  const sections = (tabData.sections || []).filter(s => s.label);
  if (!sections.length) return '';
  return `<div class="section-nav">${sections.map(s =>
    `<button class="snav-btn" data-section="${s.id}">${esc(s.label)}</button>`
  ).join('')}</div>`;
}

function renderFooter() {
  return `<div class="site-footer">
    <div style="display:flex;align-items:baseline"><span class="f-lp">Product</span><span class="f-la">.ai</span></div>
    <span class="f-meta">Internal - March 2026</span>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// RENDER: GALLERY
// ═══════════════════════════════════════════════════════════════
function renderCard(item, tabId) {
  const previewClass = item.type === 'wide' ? 'wide' : item.type === 'tall' ? 'tall' : '';
  return `<div class="card${item.full ? ' full' : ''}" data-tab="${tabId}" data-slug="${item.slug}">
    <div class="card-preview${previewClass ? ' ' + previewClass : ''}">
      <iframe src="${item.src}" loading="lazy" tabindex="-1"></iframe>
    </div>
    <div class="card-info">
      <h3>${esc(item.title)}</h3>
      <p>${esc(item.desc)}</p>
      <div class="tags">${renderTags(item.tags)}</div>
    </div>
  </div>`;
}

function renderBadgesCustom() {
  return `<div class="badge-display">
    <div class="badge-row">
      <div class="badge-item">
        <div class="badge-icon inactive">${IC.bars.replace('fill="currentColor"','fill="#8b5cf6"')}</div>
        <span class="badge-label" style="color:var(--text-4)">Inactive</span>
      </div>
      <div class="badge-item">
        <div class="badge-icon active">
          ${IC.bars.replace('fill="currentColor"','fill="white"')}
          <div class="badge-dot" style="background:#34d399"></div>
        </div>
        <span class="badge-label" style="color:#34d399">Verdict Ready</span>
      </div>
      <div class="badge-item">
        <div class="badge-icon active">
          ${IC.bars.replace('fill="currentColor"','fill="white"')}
          <div class="badge-dot" style="background:#8b5cf6"></div>
        </div>
        <span class="badge-label" style="color:var(--v400)">Deep Analysis</span>
      </div>
    </div>
  </div>
  <div class="toolbar-context">
    <div class="toolbar-strip">
      <div class="toolbar-icon" style="color:var(--text-4)">
        <svg width="16" height="16" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16"><circle cx="128" cy="128" r="96"/><path d="M168 128a40 40 0 1 0-40 40"/></svg>
      </div>
      <div class="toolbar-icon" style="background:var(--v500);border-radius:6px;position:relative">
        <svg width="14" height="14" viewBox="0 0 256 256" fill="white"><path d="M176 232a8 8 0 0 1-8-8V72a8 8 0 0 1 16 0v152a8 8 0 0 1-8 8zm-48 0a8 8 0 0 1-8-8V104a8 8 0 0 1 16 0v120a8 8 0 0 1-8 8zm-48 0a8 8 0 0 1-8-8V136a8 8 0 0 1 16 0v88a8 8 0 0 1-8 8z"/></svg>
        <div style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:#34d399;border:2px solid #252525"></div>
      </div>
      <div class="toolbar-icon" style="color:var(--text-4)">
        <svg width="16" height="16" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16"><circle cx="128" cy="128" r="4" fill="currentColor"/><circle cx="128" cy="64" r="4" fill="currentColor"/><circle cx="128" cy="192" r="4" fill="currentColor"/></svg>
      </div>
    </div>
    <p>Click the Product.ai icon to open the side panel. Green badge = verdict ready for this product.</p>
  </div>`;
}

function renderGallerySection(section, tabId) {
  let html = `<div class="section" id="s-${section.id}">
    <div class="section-header">
      <div class="section-label">${esc(section.sublabel)}</div>
      <h2>${esc(section.label)}</h2>
      ${section.desc ? `<p>${esc(section.desc)}</p>` : ''}
    </div>`;

  if (section.custom === 'badges') {
    html += renderBadgesCustom();
  }

  if (section.items && section.items.length) {
    html += `<div class="card-grid">`;
    for (const item of section.items) {
      html += renderCard(item, tabId);
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function renderGallery(tabData) {
  let html = renderHeader();
  html += `<div class="sticky-nav">`;
  html += renderTabBar(tabData.id);
  html += renderSectionNav(tabData);
  html += `</div>`;

  for (const section of tabData.sections) {
    html += renderGallerySection(section, tabData.id);
  }

  html += renderFooter();
  app.innerHTML = html;
  document.title = `${tabData.label} - Product.ai Consumer Surfaces`;
  bindGalleryEvents(tabData);
}

function renderStrategy() {
  let html = renderHeader();
  html += `<div class="sticky-nav">`;
  html += renderTabBar('strategy');
  html += `</div>`;
  html += `<div class="strategy-embed"><iframe src="strategy-page.html" loading="lazy"></iframe></div>`;
  html += renderFooter();
  app.innerHTML = html;
  document.title = 'Strategy - Product.ai Consumer Surfaces';
  bindTabEvents();
}

// ═══════════════════════════════════════════════════════════════
// RENDER: DETAIL
// ═══════════════════════════════════════════════════════════════
function renderDetail(tabData, slug) {
  const allItems = getAllItems(tabData);
  const idx = allItems.findIndex(it => it.slug === slug);
  if (idx === -1) { navigate(tabData.id); return; }

  const item = allItems[idx];
  const prev = idx > 0 ? allItems[idx - 1] : null;
  const next = idx < allItems.length - 1 ? allItems[idx + 1] : null;
  const isMobile = item.type === 'mobile';
  const frameH = item.type === 'tall' ? 3000 : (item.type === 'wide' ? 1000 : 844);

  let html = `<div class="detail-bar"><div class="detail-bar-inner">
    <button class="detail-back" data-tab="${tabData.id}">
      ${IC.back} ${esc(tabData.label)}
    </button>
    <div class="detail-actions">
      <span style="font-size:11px;font-family:var(--mono);color:var(--text-5);margin-right:4px">${idx + 1} / ${allItems.length}</span>
      <button class="detail-nav-btn" id="btn-prev" ${prev ? `data-go="${tabData.id}/${prev.slug}"` : 'disabled'}>
        ${IC.back} Prev
      </button>
      <button class="detail-nav-btn" id="btn-next" ${next ? `data-go="${tabData.id}/${next.slug}"` : 'disabled'}>
        Next ${IC.next}
      </button>
      <a class="detail-open" href="${item.src}" target="_blank" rel="noopener">
        Open file ${IC.ext}
      </a>
    </div>
  </div></div>`;

  html += `<div class="detail-content">
    <div class="detail-meta">
      <div class="detail-meta-left">
        <h1>${esc(item.title)}</h1>
        <p>${esc(item.desc)}</p>
        <div class="tags">${renderTags(item.tags)}</div>
      </div>
    </div>
    <div class="detail-mockup ${isMobile ? 'mobile-frame' : 'wide-frame'}">
      <iframe src="${item.src}" scrolling="no" id="detail-iframe"
        ${isMobile ? 'style="width:390px;height:844px"' : `style="min-height:${frameH}px"`}></iframe>
    </div>`;

  if (item.caption) {
    html += `<div class="detail-context">
      <h3>Design Context</h3>
      <p>${esc(item.caption)}</p>
    </div>`;
  }

  html += `</div>`;

  html += `<div class="kbd-hint">
    <span><kbd>Esc</kbd> back</span>
    <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate</span>
  </div>`;

  html += renderFooter();
  app.innerHTML = html;
  window.scrollTo(0, 0);
  document.title = `${item.title} - Product.ai Consumer Surfaces`;

  // Auto-size wide iframes
  if (!isMobile) {
    const iframe = document.getElementById('detail-iframe');
    if (iframe) {
      iframe.addEventListener('load', function() {
        try {
          const h = this.contentDocument.documentElement.scrollHeight;
          if (h > 100) this.style.height = h + 'px';
        } catch(e) { /* cross-origin fallback: keep min-height */ }
      });
    }
  }

  bindDetailEvents(tabData, prev, next);
}

// ═══════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════
function bindTabEvents() {
  for (const btn of $$('.tab-btn')) {
    btn.addEventListener('click', () => navigate(btn.dataset.tab));
  }
}

function bindGalleryEvents(tabData) {
  bindTabEvents();

  // Section nav
  for (const btn of $$('.snav-btn')) {
    btn.addEventListener('click', () => {
      const el = document.getElementById('s-' + btn.dataset.section);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  // Cards
  for (const card of $$('.card[data-slug]')) {
    card.addEventListener('click', (e) => {
      if (e.metaKey || e.ctrlKey) {
        const item = findItem(card.dataset.tab, card.dataset.slug);
        if (item) window.open(item.src, '_blank');
        return;
      }
      navigate(card.dataset.tab + '/' + card.dataset.slug);
    });
  }
}

function bindDetailEvents(tabData, prev, next) {
  const backBtn = $('.detail-back');
  if (backBtn) backBtn.addEventListener('click', () => navigate(backBtn.dataset.tab));

  const prevBtn = $('#btn-prev');
  if (prevBtn && prev) prevBtn.addEventListener('click', () => navigate(prevBtn.dataset.go));

  const nextBtn = $('#btn-next');
  if (nextBtn && next) nextBtn.addEventListener('click', () => navigate(nextBtn.dataset.go));

  // Keyboard
  window._detailKeyHandler = function(e) {
    if (e.key === 'Escape') { navigate(tabData.id); e.preventDefault(); }
    if (e.key === 'ArrowLeft' && prev) { navigate(tabData.id + '/' + prev.slug); e.preventDefault(); }
    if (e.key === 'ArrowRight' && next) { navigate(tabData.id + '/' + next.slug); e.preventDefault(); }
  };
}

function findItem(tabId, slug) {
  const tab = TABS.find(t => t.id === tabId);
  if (!tab || !tab.sections) return null;
  for (const s of tab.sections) {
    for (const it of s.items || []) {
      if (it.slug === slug) return it;
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════
function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return { tab: 'mobile', slug: null };
  const slash = h.indexOf('/');
  if (slash === -1) return { tab: h, slug: null };
  return { tab: h.slice(0, slash), slug: h.slice(slash + 1) };
}

function navigate(path) {
  location.hash = path;
}

function renderSitemap() {
  const base = 'https://productai-mockups.vercel.app/';
  let html = renderHeader();
  html += `<div class="sticky-nav">`;
  html += `<div class="tab-bar" style="max-width:var(--max-w);margin:0 auto;padding:0 var(--px)">
    <button class="tab-btn" data-tab="mobile">Mobile App</button>
    <button class="tab-btn" data-tab="extension">Desktop Extension</button>
    <button class="tab-btn" data-tab="website">Website & Trust</button>
    <button class="tab-btn" data-tab="skincare">Skincare GTM</button>
    <button class="tab-btn" data-tab="revenue">Revenue Disclosure</button>
    <button class="tab-btn" data-tab="strategy">Strategy</button>
    <button class="tab-btn active" data-tab="sitemap">Sitemap</button>
  </div>`;
  html += `</div>`;
  html += `<div class="detail-content" style="padding-top:40px">`;
  html += `<div class="detail-meta" style="margin-bottom:36px"><div class="detail-meta-left">
    <h1>Sitemap - All Deep Links</h1>
    <p>Every mockup screen with its permanent URL. Click any link to navigate directly. Copy the URL to share a specific screen.</p>
  </div></div>`;

  for (const tab of TABS) {
    if (tab.special) continue;
    html += `<div style="margin-bottom:40px">`;
    html += `<h2 style="font-size:18px;font-weight:600;color:var(--text-1);margin-bottom:4px;letter-spacing:-0.02em">${esc(tab.label)}</h2>`;
    html += `<a href="#${tab.id}" style="font-size:12px;font-family:var(--mono);color:var(--v400);display:inline-block;margin-bottom:16px">${base}#${tab.id}</a>`;

    for (const section of tab.sections || []) {
      if (!section.items || !section.items.length) continue;
      html += `<div style="margin-bottom:16px">`;
      html += `<div style="font-size:11px;font-family:var(--mono);color:var(--text-4);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px">${esc(section.label)}</div>`;
      for (const item of section.items) {
        const url = `${base}#${tab.id}/${item.slug}`;
        html += `<div style="display:flex;align-items:baseline;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
          <a href="#${tab.id}/${item.slug}" style="font-size:14px;font-weight:500;color:var(--text-1);min-width:280px;transition:color 150ms" onmouseover="this.style.color='var(--v400)'" onmouseout="this.style.color='var(--text-1)'">${esc(item.title)}</a>
          <code style="font-size:11px;font-family:var(--mono);color:var(--text-5);word-break:break-all">#${tab.id}/${item.slug}</code>
          <code style="font-size:11px;font-family:var(--mono);color:var(--text-6);word-break:break-all;margin-left:auto">${item.src}</code>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  html += renderFooter();
  app.innerHTML = html;
  document.title = 'Sitemap - Product.ai Consumer Surfaces';
  bindTabEvents();
}

function handleRoute() {
  const { tab, slug } = parseHash();

  if (tab === 'sitemap') { renderSitemap(); return; }

  const tabData = TABS.find(t => t.id === tab);

  if (!tabData) { navigate('mobile'); return; }

  if (tabData.special === 'strategy') {
    renderStrategy();
  } else if (slug) {
    renderDetail(tabData, slug);
  } else {
    renderGallery(tabData);
  }
}

// Global keyboard handler
document.addEventListener('keydown', function(e) {
  if (window._detailKeyHandler) window._detailKeyHandler(e);
});

// Clear detail key handler when navigating away from detail
window.addEventListener('hashchange', function() {
  window._detailKeyHandler = null;
  handleRoute();
});

// Init
handleRoute();
</script>

</html>
